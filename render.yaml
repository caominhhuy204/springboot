services:
  - type: web
    name: learneng-backend
    runtime: docker
    rootDir: backend/english
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        sync: false
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: APP_COOKIE_SECURE
        value: "true"
      - key: APP_COOKIE_SAME_SITE
        value: None
      - key: JPA_DDL_AUTO
        value: update
      - key: SERVER_FORWARD_HEADERS_STRATEGY
        value: framework
      - key: PRONUNCIATION_STORAGE_DIR
        value: /app/uploads/pronunciation
      - key: SPRING_PROFILES_ACTIVE
        value: oauth
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: MAIL_HOST
        value: smtp.gmail.com
      - key: MAIL_PORT
        value: "587"
      - key: MAIL_USERNAME
        sync: false
      - key: MAIL_PASSWORD
        sync: false

  - type: web
    name: learneng-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
      - key: VITE_GOOGLE_AUTH_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
